<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login_Samady_Register_Form</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            color: #1d2129;
        }
        .login-card {
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
        }
        .shake {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
        .error-toast {
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn {
            from { transform: translateY(-100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6">

    <!-- Error Toast -->
    <div id="errorToast" class="fixed top-4 left-1/2 transform -translate-x-1/2 bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg shadow-lg hidden items-center gap-2 z-50 min-w-[320px]">
        <i data-lucide="alert-circle" class="w-5 h-5 flex-shrink-0"></i>
        <span id="errorMessage" class="text-sm font-medium">Invalid credentials</span>
    </div>

    <!-- Login Container -->
    <div class="w-full max-w-[400px] space-y-8">
        
        <!-- Logo & Header -->
        <div class="text-center space-y-4">
            <div class="flex justify-center">
                <div class="w-14 h-14 bg-blue-600 rounded-xl flex items-center justify-center text-white font-bold text-3xl shadow-lg shadow-blue-500/20">
                    F
                </div>
            </div>
            <div class="space-y-1">
                <h1 class="text-2xl font-bold tracking-tight text-gray-900">Login to Frappe</h1>
                <p class="text-sm text-gray-500">Enter your credentials to access your desk</p>
            </div>
        </div>

        <!-- Login Card -->
        <div id="loginCard" class="bg-white p-8 rounded-2xl border border-[#d1d8dd] login-card space-y-6">
            
            <form id="loginForm" class="space-y-5">
                <!-- Email/Username -->
                <div class="space-y-2">
                    <label for="email" class="text-xs font-bold text-gray-500 uppercase tracking-wider">Email or Username</label>
                    <div class="relative">
                        <i data-lucide="user" class="absolute left-3 top-2.5 text-gray-400 w-4 h-4"></i>
                        <input 
                            type="text" 
                            id="email" 
                            placeholder="jane@example.com"
                            class="w-full pl-10 pr-4 py-2.5 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition-all"
                            required
                            autocomplete="username"
                        >
                    </div>
                </div>

                <!-- Password -->
                <div class="space-y-2">
                    <div class="flex justify-between items-center">
                        <label for="password" class="text-xs font-bold text-gray-500 uppercase tracking-wider">Password</label>
                        <a href="#" class="text-xs font-semibold text-blue-600 hover:text-blue-700">Forgot password?</a>
                    </div>
                    <div class="relative">
                        <i data-lucide="key" class="absolute left-3 top-2.5 text-gray-400 w-4 h-4"></i>
                        <input 
                            type="password" 
                            id="password" 
                            placeholder="••••••••"
                            class="w-full pl-10 pr-12 py-2.5 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition-all"
                            required
                            autocomplete="current-password"
                        >
                        <button type="button" id="togglePassword" class="absolute right-3 top-2.5 text-gray-400 hover:text-gray-600 transition-colors">
                            <i data-lucide="eye" class="w-4 h-4" id="eyeIcon"></i>
                        </button>
                    </div>
                </div>

                <!-- Submit Button -->
                <button 
                    type="submit" 
                    id="loginBtn"
                    class="w-full py-2.5 bg-blue-600 text-white rounded-lg text-sm font-semibold hover:bg-blue-700 transition-all shadow-md shadow-blue-500/10 active:scale-[0.98] flex items-center justify-center gap-2 disabled:opacity-70 disabled:cursor-not-allowed"
                >
                    <span id="btnText">Login</span>
                    <i data-lucide="arrow-right" class="w-4 h-4" id="btnIcon"></i>
                </button>
            </form>
        </div>
        
     
    </div>

    <script src="/JS/login.js"></script>
</body>
</html>
